
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  labels:
    app: nginx
    environment: production
spec:
  type: NodePort
  selector:
    app: nginx  # matches pod label (Service finds pods with this label)
  ports:
  - port: 80  # service port
    targetPort: 80  # container port
    nodePort: 30011   # external port (optional)

  